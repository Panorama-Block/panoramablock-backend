name: Deploy Public API VM

on:
  workflow_dispatch:
    inputs:
      gateway_image:
        description: Telegram gateway image reference. Defaults to ghcr.io/<owner>/telegram-gateway:latest
        required: false
        type: string

permissions:
  contents: read
  packages: write
  id-token: write

env:
  GHCR_REGISTRY: ghcr.io
  RG: rg-panorama-dev
  PROJECT_NAME: panorama
  ENVIRONMENT_NAME: dev
  IMAGE_TAG: ${{ github.sha }}
  DEPLOY_PATH: /opt/public-api/current
  KEY_VAULT_NAME: ${{ secrets.AZURE_KEY_VAULT_NAME }}

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      gateway_image: ${{ steps.gateway_image.outputs.image }}
    steps:
      - name: Resolve telegram gateway image
        id: gateway_image
        env:
          INPUT_GATEWAY_IMAGE: ${{ inputs.gateway_image }}
          VAR_GATEWAY_IMAGE: ${{ vars.TELEGRAM_GATEWAY_IMAGE }}
          SECRET_GATEWAY_IMAGE: ${{ secrets.TELEGRAM_GATEWAY_IMAGE }}
          REPOSITORY_OWNER: ${{ github.repository_owner }}
        run: |
          set -euo pipefail

          OWNER_LOWER=$(echo "${REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')
          GATEWAY_IMAGE="${INPUT_GATEWAY_IMAGE:-}"
          if [[ -z "${GATEWAY_IMAGE}" ]]; then
            GATEWAY_IMAGE="${VAR_GATEWAY_IMAGE:-}"
          fi
          if [[ -z "${GATEWAY_IMAGE}" ]]; then
            GATEWAY_IMAGE="${SECRET_GATEWAY_IMAGE:-}"
          fi
          if [[ -z "${GATEWAY_IMAGE}" ]]; then
            GATEWAY_IMAGE="ghcr.io/${OWNER_LOWER}/telegram-gateway:latest"
          fi

          echo "image=${GATEWAY_IMAGE}" >> "$GITHUB_OUTPUT"

  build:
    runs-on: ubuntu-latest
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: auth-service
            context: ./auth-service
            dockerfile: ./auth-service/Dockerfile
          - name: bridge-service
            context: ./bridge-service
            dockerfile: ./bridge-service/Dockerfile
          - name: liquid-swap
            context: .
            dockerfile: ./liquid-swap-service/Dockerfile
          - name: lido-service
            context: ./lido-service
            dockerfile: ./lido-service/Dockerfile
          - name: lending-service
            context: ./lending-service
            dockerfile: ./lending-service/Dockerfile
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ secrets.GHCR_USERNAME }}
          password: ${{ secrets.GHCR_PASSWORD }}

      - name: Compute image name
        id: image
        run: |
          OWNER_LOWER=$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')
          echo "image=${GHCR_REGISTRY}/${OWNER_LOWER}/${{ matrix.name }}:${IMAGE_TAG}" >> "$GITHUB_OUTPUT"

      - name: Build and push
        run: |
          docker build -t "${{ steps.image.outputs.image }}" -f "${{ matrix.dockerfile }}" "${{ matrix.context }}"
          docker push "${{ steps.image.outputs.image }}"

  deploy:
    runs-on: ubuntu-latest
    needs:
      - prepare
      - build
    steps:
      - uses: actions/checkout@v4

      - name: Azure login with OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Compute shared namespace
        id: meta
        run: |
          OWNER_LOWER=$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')
          echo "namespace=${OWNER_LOWER}" >> "$GITHUB_OUTPUT"

      - name: Resolve VM hosts
        id: vm_hosts
        run: |
          set -euo pipefail

          PUBLIC_API_PIP_NAME="${PROJECT_NAME}-${ENVIRONMENT_NAME}-telegram-gateway-pip"
          PUBLIC_API_VM_HOST=$(az network public-ip show \
            --resource-group "$RG" \
            --name "$PUBLIC_API_PIP_NAME" \
            --query ipAddress \
            -o tsv)

          HEAVY_VM_NAME="${PROJECT_NAME}-${ENVIRONMENT_NAME}-vm"
          HEAVY_VM_PRIVATE_IP=$(az vm list-ip-addresses \
            --resource-group "$RG" \
            --name "$HEAVY_VM_NAME" \
            --query "[0].virtualMachine.network.privateIpAddresses[0]" \
            -o tsv)

          echo "public_api_host=${PUBLIC_API_VM_HOST}" >> "$GITHUB_OUTPUT"
          echo "heavy_vm_private_ip=${HEAVY_VM_PRIVATE_IP}" >> "$GITHUB_OUTPUT"

      - name: Render runtime env from Key Vault
        env:
          HEAVY_VM_PRIVATE_IP: ${{ steps.vm_hosts.outputs.heavy_vm_private_ip }}
          TELEGRAM_GATEWAY_IMAGE: ${{ needs.prepare.outputs.gateway_image }}
        run: |
          set -euo pipefail

          rm -rf .deploy-tmp
          mkdir -p .deploy-tmp

          APP_DOMAIN=$(az keyvault secret show --vault-name "$KEY_VAULT_NAME" --name app-domain --query value -o tsv)
          LETSENCRYPT_EMAIL=$(az keyvault secret show --vault-name "$KEY_VAULT_NAME" --name letsencrypt-email --query value -o tsv)
          PUBLIC_GATEWAY_URL=$(az keyvault secret show --vault-name "$KEY_VAULT_NAME" --name public-gateway-url --query value -o tsv)
          PUBLIC_WEBAPP_URL=$(az keyvault secret show --vault-name "$KEY_VAULT_NAME" --name public-webapp-url --query value -o tsv)
          WEBSITE_URL=$(az keyvault secret show --vault-name "$KEY_VAULT_NAME" --name website-url --query value -o tsv)
          GATEWAY_DOMAIN=$(python3 -c "from urllib.parse import urlparse; import sys; print(urlparse(sys.argv[1]).netloc)" "$PUBLIC_GATEWAY_URL")
          AUTH_API_BASE="https://${APP_DOMAIN}"
          AGENTS_API_BASE=$(az keyvault secret show --vault-name "$KEY_VAULT_NAME" --name agents-api-base --query value -o tsv)
          TELEGRAM_BOT_TOKEN=$(az keyvault secret show --vault-name "$KEY_VAULT_NAME" --name telegram-bot-token --query value -o tsv)
          TELEGRAM_WEBHOOK_SECRET=$(az keyvault secret show --vault-name "$KEY_VAULT_NAME" --name telegram-webhook-secret --query value -o tsv)
          DEFAULT_WALLET_ADDRESS=$(az keyvault secret show --vault-name "$KEY_VAULT_NAME" --name default-wallet-address --query value -o tsv 2>/dev/null || true)
          HEAVY_VM_BACKHAUL_HOST="${HEAVY_VM_PRIVATE_IP}:8081"

          cat > .deploy-tmp/.env.production <<EOF
          APP_DOMAIN=${APP_DOMAIN}
          GATEWAY_DOMAIN=${GATEWAY_DOMAIN}
          LETSENCRYPT_EMAIL=${LETSENCRYPT_EMAIL}
          GHCR_REGISTRY=${GHCR_REGISTRY}
          GHCR_NAMESPACE=${{ steps.meta.outputs.namespace }}
          GHCR_USERNAME=$(az keyvault secret show --vault-name "$KEY_VAULT_NAME" --name ghcr-username --query value -o tsv)
          GHCR_PASSWORD=$(az keyvault secret show --vault-name "$KEY_VAULT_NAME" --name ghcr-password --query value -o tsv)
          IMAGE_TAG=${IMAGE_TAG}
          TELEGRAM_GATEWAY_IMAGE=${TELEGRAM_GATEWAY_IMAGE}
          NODE_ENV=production
          LOG_LEVEL=info
          HEAVY_VM_BACKHAUL_HOST=${HEAVY_VM_BACKHAUL_HOST}
          HEAVY_VM_PRIVATE_IP=${HEAVY_VM_PRIVATE_IP}
          ALLOWED_ORIGINS=$(az keyvault secret show --vault-name "$KEY_VAULT_NAME" --name allowed-origins --query value -o tsv)
          POSTGRES_HOST=$(az keyvault secret show --vault-name "$KEY_VAULT_NAME" --name postgres-host --query value -o tsv)
          POSTGRES_APP_USER=$(az keyvault secret show --vault-name "$KEY_VAULT_NAME" --name postgres-app-user --query value -o tsv)
          POSTGRES_APP_PASSWORD=$(az keyvault secret show --vault-name "$KEY_VAULT_NAME" --name postgres-app-password --query value -o tsv)
          REDIS_PASS=$(az keyvault secret show --vault-name "$KEY_VAULT_NAME" --name redis-pass --query value -o tsv)
          REDIS_HOST=redis
          REDIS_PORT=6379
          REDIS_URL=redis://:$(az keyvault secret show --vault-name "$KEY_VAULT_NAME" --name redis-pass --query value -o tsv)@redis:6379
          DB_GATEWAY_URL=http://${HEAVY_VM_BACKHAUL_HOST}/database
          DB_GATEWAY_SERVICE_TOKEN=$(az keyvault secret show --vault-name "$KEY_VAULT_NAME" --name db-gateway-service-token --query value -o tsv)
          DB_GATEWAY_TENANT_ID=$(az keyvault secret show --vault-name "$KEY_VAULT_NAME" --name db-gateway-tenant-id --query value -o tsv)
          DB_GATEWAY_SYNC_ENABLED=$(az keyvault secret show --vault-name "$KEY_VAULT_NAME" --name db-gateway-sync-enabled --query value -o tsv)
          DB_GATEWAY_TIMEOUT_MS=$(az keyvault secret show --vault-name "$KEY_VAULT_NAME" --name db-gateway-timeout-ms --query value -o tsv)
          THIRDWEB_CLIENT_ID=$(az keyvault secret show --vault-name "$KEY_VAULT_NAME" --name thirdweb-client-id --query value -o tsv)
          THIRDWEB_SECRET_KEY=$(az keyvault secret show --vault-name "$KEY_VAULT_NAME" --name thirdweb-secret-key --query value -o tsv)
          THIRDWEB_API_SECRET_KEY=$(az keyvault secret show --vault-name "$KEY_VAULT_NAME" --name thirdweb-api-secret-key --query value -o tsv)
          ENGINE_ACCESS_TOKEN=$(az keyvault secret show --vault-name "$KEY_VAULT_NAME" --name engine-access-token --query value -o tsv)
          ENGINE_URL=http://${HEAVY_VM_BACKHAUL_HOST}/engine
          THIRDWEB_ENGINE_URL=http://${HEAVY_VM_BACKHAUL_HOST}/engine
          EXECUTION_LAYER_URL=http://${HEAVY_VM_BACKHAUL_HOST}/execution
          EXECUTION_SERVICE_URL=http://${HEAVY_VM_BACKHAUL_HOST}/execution
          ADMIN_WALLET_ADDRESS=$(az keyvault secret show --vault-name "$KEY_VAULT_NAME" --name admin-wallet-address --query value -o tsv)
          ENCRYPTION_PASSWORD=$(az keyvault secret show --vault-name "$KEY_VAULT_NAME" --name encryption-password --query value -o tsv)
          AUTH_PRIVATE_KEY=$(az keyvault secret show --vault-name "$KEY_VAULT_NAME" --name auth-private-key --query value -o tsv)
          AUTH_DOMAIN=https://${APP_DOMAIN}
          AUTH_API_BASE=${AUTH_API_BASE}
          TON_JWT_SECRET=$(az keyvault secret show --vault-name "$KEY_VAULT_NAME" --name ton-jwt-secret --query value -o tsv)
          JWT_SECRET=$(az keyvault secret show --vault-name "$KEY_VAULT_NAME" --name jwt-secret --query value -o tsv)
          PRIVATE_KEY=$(az keyvault secret show --vault-name "$KEY_VAULT_NAME" --name private-key --query value -o tsv)
          SWAP_SENDER_ADDRESS=$(az keyvault secret show --vault-name "$KEY_VAULT_NAME" --name swap-sender-address --query value -o tsv)
          SWAP_RECEIVER_ADDRESS=$(az keyvault secret show --vault-name "$KEY_VAULT_NAME" --name swap-receiver-address --query value -o tsv)
          X_RANGO_ID=$(az keyvault secret show --vault-name "$KEY_VAULT_NAME" --name x-rango-id --query value -o tsv)
          RPC_URL=$(az keyvault secret show --vault-name "$KEY_VAULT_NAME" --name rpc-url --query value -o tsv)
          ETHEREUM_RPC_URL=$(az keyvault secret show --vault-name "$KEY_VAULT_NAME" --name ethereum-rpc-url --query value -o tsv)
          POLYGON_RPC_URL=$(az keyvault secret show --vault-name "$KEY_VAULT_NAME" --name polygon-rpc-url --query value -o tsv)
          BSC_RPC_URL=$(az keyvault secret show --vault-name "$KEY_VAULT_NAME" --name bsc-rpc-url --query value -o tsv)
          BASE_RPC_URL=$(az keyvault secret show --vault-name "$KEY_VAULT_NAME" --name base-rpc-url --query value -o tsv)
          OPTIMISM_RPC_URL=$(az keyvault secret show --vault-name "$KEY_VAULT_NAME" --name optimism-rpc-url --query value -o tsv)
          ARBITRUM_RPC_URL=$(az keyvault secret show --vault-name "$KEY_VAULT_NAME" --name arbitrum-rpc-url --query value -o tsv)
          AVALANCHE_RPC_URL=$(az keyvault secret show --vault-name "$KEY_VAULT_NAME" --name avalanche-rpc-url --query value -o tsv)
          AVAX_RPC_URL=$(az keyvault secret show --vault-name "$KEY_VAULT_NAME" --name avax-rpc-url --query value -o tsv)
          EXECUTOR_ADDRESS=$(az keyvault secret show --vault-name "$KEY_VAULT_NAME" --name executor-address --query value -o tsv)
          AVAX_EXECUTOR_ADDRESS=$(az keyvault secret show --vault-name "$KEY_VAULT_NAME" --name avax-executor-address --query value -o tsv)
          DCA_VAULT_ADDRESS=$(az keyvault secret show --vault-name "$KEY_VAULT_NAME" --name dca-vault-address --query value -o tsv)
          VALIDATION_CONTRACT_ADDRESS=$(az keyvault secret show --vault-name "$KEY_VAULT_NAME" --name validation-contract-address --query value -o tsv)
          LAYERSWAP_API_KEY=$(az keyvault secret show --vault-name "$KEY_VAULT_NAME" --name layerswap-api-key --query value -o tsv)
          LAYERSWAP_TON_VAULT=$(az keyvault secret show --vault-name "$KEY_VAULT_NAME" --name layerswap-ton-vault --query value -o tsv)
          PUBLIC_GATEWAY_URL=${PUBLIC_GATEWAY_URL}
          PUBLIC_WEBAPP_URL=${PUBLIC_WEBAPP_URL}
          WEBSITE_URL=${WEBSITE_URL}
          AGENTS_API_BASE=${AGENTS_API_BASE}
          TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
          TELEGRAM_WEBHOOK_SECRET=${TELEGRAM_WEBHOOK_SECRET}
          DEFAULT_WALLET_ADDRESS=${DEFAULT_WALLET_ADDRESS}
          AGENTS_REQUEST_TIMEOUT_MS=45000
          AGENTS_DEBUG_SHAPE=false
          DEFAULT_CHAIN_ID=8453
          NEXTJS_PROXY_ENABLED=false
          PORT=7778
          EOF

      - name: Prepare deploy bundle
        run: |
          mkdir -p .deploy-tmp/shared .deploy-tmp/scripts
          cp deploy/public-api-vm/docker-compose.yml .deploy-tmp/docker-compose.yml
          cp deploy/public-api-vm/caddy/Caddyfile .deploy-tmp/Caddyfile
          cp deploy/azure-vm/scripts/deploy.sh .deploy-tmp/scripts/deploy.sh
          cp shared/token-registry.json .deploy-tmp/shared/token-registry.json
          chmod +x .deploy-tmp/scripts/deploy.sh

      - name: Prepare VM permissions
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ steps.vm_hosts.outputs.public_api_host }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            set -euo pipefail
            APP_DIR=/opt/public-api
            CURRENT_DIR="${APP_DIR}/current"
            DEPLOY_USER='${{ secrets.VM_USER }}'
            sudo install -d -m 2775 -o "${DEPLOY_USER}" -g "${DEPLOY_USER}" "${APP_DIR}" "${CURRENT_DIR}" "${CURRENT_DIR}/scripts" "${CURRENT_DIR}/shared"

      - name: Copy bundle to VM
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ steps.vm_hosts.outputs.public_api_host }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          source: ".deploy-tmp/.env.production,.deploy-tmp/docker-compose.yml,.deploy-tmp/Caddyfile,.deploy-tmp/shared,.deploy-tmp/scripts"
          target: "${{ env.DEPLOY_PATH }}"
          strip_components: 1

      - name: Deploy public/api VM bundle
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ steps.vm_hosts.outputs.public_api_host }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            cd ${{ env.DEPLOY_PATH }}
            chmod +x ./scripts/deploy.sh
            APP_DIR=/opt/public-api ./scripts/deploy.sh
