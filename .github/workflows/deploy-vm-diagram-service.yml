name: Deploy Diagram Service To VM

on:
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  deploy:
    uses: ./.github/workflows/deploy-vm-service.yml
    with:
      service_name: diagram-service
      compose_service: diagram_service
      docker_context: ./diagram-service
      dockerfile: ./diagram-service/Dockerfile
    secrets: inherit
