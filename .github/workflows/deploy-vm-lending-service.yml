name: Deploy Lending Service To VM

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "lending-service/**"
      - "deploy/azure-vm/**"
      - ".github/workflows/deploy-vm-lending-service.yml"
      - ".github/workflows/deploy-vm-service.yml"

permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  deploy:
    uses: ./.github/workflows/deploy-vm-service.yml
    with:
      service_name: lending-service
      compose_service: lending_service
      docker_context: ./lending-service
      dockerfile: ./lending-service/Dockerfile
    secrets: inherit
