name: Deploy Database Gateway

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'database/**'
      - '.github/workflows/deploy-database-gateway.yml'
      - '.github/workflows/deploy-vm-service.yml'
      - 'deploy/azure-vm/**'

jobs:
  deploy:
    uses: ./.github/workflows/deploy-vm-service.yml
    permissions:
      id-token: write
      contents: read
      packages: write
    with:
      service_name: database-gateway
      compose_service: database_gateway
      docker_context: ./database
      dockerfile: ./database/Dockerfile
