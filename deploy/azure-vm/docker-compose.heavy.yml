name: panorama

services:
  dca_service:
    image: ${GHCR_REGISTRY:-ghcr.io}/${GHCR_NAMESPACE}/dca-service:${IMAGE_TAG}
    env_file:
      - .env.production
    environment:
      DCA_PORT: 3007
      NODE_ENV: ${NODE_ENV:-production}
      AUTH_SERVICE_URL: http://auth_service:3001
      DATABASE_URL: postgresql://${POSTGRES_APP_USER}:${POSTGRES_APP_PASSWORD}@${POSTGRES_HOST}:5432/panorama_dca?sslmode=require
      DB_HOST: ${POSTGRES_HOST}
      DB_PORT: 5432
      DB_NAME: panorama_dca
      DB_USER: ${POSTGRES_APP_USER}
      DB_PASSWORD: ${POSTGRES_APP_PASSWORD}
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
      ENGINE_URL: http://engine:3005
    ports:
      - "127.0.0.1:3008:3007"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3007/health').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
        ]
      interval: 30s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    depends_on:
      engine:
        condition: service_started
      redis:
        condition: service_started

  diagram_service:
    image: ${GHCR_REGISTRY:-ghcr.io}/${GHCR_NAMESPACE}/diagram-service:${IMAGE_TAG}
    env_file:
      - .env.production
    environment:
      PORT: 3010
      NODE_ENV: ${NODE_ENV:-production}
      DATABASE_URL: postgresql://${POSTGRES_APP_USER}:${POSTGRES_APP_PASSWORD}@${POSTGRES_HOST}:5432/panorama_core?sslmode=require
    ports:
      - "127.0.0.1:3010:3010"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3010/health').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
        ]
      interval: 30s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  database_gateway:
    image: ${GHCR_REGISTRY:-ghcr.io}/${GHCR_NAMESPACE}/database-gateway:${IMAGE_TAG}
    env_file:
      - .env.production
    environment:
      PORT: 8080
      HOST: 0.0.0.0
      NODE_ENV: ${NODE_ENV:-production}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      DATABASE_URL: postgresql://${POSTGRES_APP_USER}:${POSTGRES_APP_PASSWORD}@${POSTGRES_HOST}:5432/panorama_data_gateway?sslmode=require
      JWT_SECRET: ${JWT_SECRET}
    ports:
      - "127.0.0.1:8080:8080"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:8080/health').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
        ]
      interval: 30s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  execution_service:
    image: ${EXECUTION_SERVICE_IMAGE}
    env_file:
      - .env.production
    environment:
      PORT: 3010
      NODE_ENV: ${NODE_ENV:-production}
    ports:
      - "127.0.0.1:3011:3010"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3010/health').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
        ]
      interval: 30s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  engine:
    image: thirdweb/engine:latest
    env_file:
      - .env.production
    environment:
      PORT: 3005
      LOG_LEVEL: ${LOG_LEVEL:-info}
      POSTGRES_CONNECTION_URL: postgresql://${POSTGRES_APP_USER}:${POSTGRES_APP_PASSWORD}@${POSTGRES_HOST}:5432/panorama_core?sslmode=require
      REDIS_URL: ${REDIS_URL:-redis://:${REDIS_PASS}@redis:6379}
    ports:
      - "127.0.0.1:3005:3005"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3005/health').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
        ]
      interval: 30s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_started

  worker_example:
    image: ${GHCR_REGISTRY:-ghcr.io}/${GHCR_NAMESPACE}/dca-service:${IMAGE_TAG}
    command: ["npm", "run", "worker"]
    env_file:
      - .env.production
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      DATABASE_URL: postgresql://${POSTGRES_APP_USER}:${POSTGRES_APP_PASSWORD}@${POSTGRES_HOST}:5432/panorama_dca?sslmode=require
    restart: unless-stopped
    profiles:
      - workers

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes", "--requirepass", "${REDIS_PASS}"]
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a ${REDIS_PASS} ping | grep PONG"]
      interval: 30s
      timeout: 5s
      retries: 5
    restart: unless-stopped

networks:
  default:
    name: panorama-internal
